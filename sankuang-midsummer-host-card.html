<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>三光仲夏音樂會｜平板主持手卡</title><style>:root{--bg:#0b1020;--card:#121b33;--card2:#172443;--text:#f6f7fb;--muted:#b7c0d8;--line:rgba(255,255,255,.16);--male:#79c7ff;--female:#ff9fc2;--both:#a7f3d0;--stage:#ffd166;--aud:#d9b8ff;--fs:29px}html.light{--bg:#f4f6fb;--card:#fff;--card2:#eef3ff;--text:#101828;--muted:#526071;--line:rgba(16,24,40,.16);--male:#005d99;--female:#a10f52;--both:#047857;--stage:#8a4b00;--aud:#6d28d9}*{box-sizing:border-box}body{margin:0;min-height:100vh;min-height:100dvh;overflow:hidden;background:radial-gradient(circle at top left,rgba(57,87,167,.45),transparent 35%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif}.app{height:100vh;height:100dvh;display:grid;grid-template-rows:auto 7px minmax(0,1fr) auto}header{padding:12px 14px;border-bottom:1px solid var(--line);background:rgba(8,13,28,.88);display:grid;grid-template-columns:1fr auto;gap:10px}html.light header,html.light footer{background:rgba(255,255,255,.92)}.event{font-weight:900;color:var(--muted);font-size:17px}.title{font-weight:950;font-size:clamp(24px,4vw,38px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}button,select{min-height:46px;border:1px solid var(--line);background:var(--card2);color:var(--text);border-radius:14px;padding:8px 13px;font-size:18px;font-weight:850}select{max-width:360px}.bar{background:rgba(255,255,255,.1)}.prog{height:100%;width:0;background:linear-gradient(90deg,#ffd166,#a7f3d0)}main{overflow:hidden;position:relative;min-height:0}.card{height:100%;overflow:auto;-webkit-overflow-scrolling:touch;padding:18px 18px 20px}.inner{max-width:1180px;margin:auto;display:flex;flex-direction:column;gap:12px}.card .inner{padding-right:76px}.line{display:grid;grid-template-columns:minmax(112px,172px) 1fr;gap:12px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.05);padding:13px 14px}.role{display:flex;align-items:center;justify-content:center;text-align:center;border-radius:15px;background:rgba(255,255,255,.08);font-size:20px;font-weight:950;padding:8px}.text{font-size:var(--fs);font-weight:760;line-height:1.56;letter-spacing:.015em}.male{color:var(--male)}.female{color:var(--female)}.both{color:var(--both)}.stage,.hint{color:var(--stage)}.audience{color:var(--aud)}.line.stage,.line.hint{border-color:color-mix(in srgb,var(--stage) 45%,transparent);background:color-mix(in srgb,var(--stage) 9%,transparent)}.rescue{color:#ff7a7a}.line.rescue{border-color:rgba(255,122,122,.45);background:rgba(255,122,122,.08)}footer{padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;border-top:1px solid var(--line);background:rgba(8,13,28,.9)}.nav{min-height:58px;font-size:22px;width:100%}.count{min-width:110px;text-align:center;font-weight:950;color:var(--muted);font-size:18px}.fab{position:fixed;right:14px;bottom:calc(88px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:10px}.fab button{min-width:58px;min-height:52px;border-radius:18px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.58);z-index:20;display:none;align-items:center;justify-content:center;padding:18px}.modal.open{display:flex}.box{width:min(1050px,100%);max-height:90vh;overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:26px;padding:20px}.boxhead{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.boxtitle{font-size:28px;font-weight:950;color:var(--stage)}body.locked .tools select,body.locked .tools button:not(#lock),body.locked .fab{display:none}body.locked header{grid-template-columns:1fr auto}@media (orientation:portrait){header{grid-template-columns:1fr}.tools{justify-content:stretch}.card{padding:14px 14px 86px}.card .inner{padding-right:62px}.fab{right:10px;bottom:calc(90px + env(safe-area-inset-bottom))}.fab button{min-width:54px;min-height:50px}select{max-width:none;flex:1 1 100%}.line{grid-template-columns:1fr}.role{justify-content:flex-start}.title{white-space:normal}.text{font-size:calc(var(--fs)*.94)}}@media print{header,footer,.fab{display:none}body{overflow:auto;background:white;color:black}.app,main,.card{height:auto;overflow:visible}.line{page-break-inside:avoid}}</style></head><body><div class="app"><header><div><div class="event">三光仲夏音樂會｜平板主持手卡</div><div id="segTitle" class="title"></div></div><div class="tools"><select id="jump"></select><button id="small">字－</button><button id="big">字＋</button><button id="theme">☀︎/☾</button><button id="lock">鎖定</button><button id="full">全螢幕</button></div></header><div class="bar"><div id="prog" class="prog"></div></div><main><section id="card" class="card"><div id="content" class="inner"></div></section></main><footer><button id="next" class="nav">下一段 →</button><div id="count" class="count"></div><button id="prev" class="nav">← 上一段</button></footer></div><div class="fab"><button id="top">↑</button><button id="rescue">救援</button></div><div id="modal" class="modal"><div class="box"><div class="boxhead"><div><div class="boxtitle">現場救援短句</div><div style="color:var(--muted);font-size:16px">臨時卡住時，挑一句就好，不要整段念完。</div></div><button id="close">關閉</button></div><div id="rescueContent" class="inner"></div></div></div><script>const segments=[{"title":"流程總覽／操作說明","lines":[["標題","三光仲夏音樂會"],["標題","雙主持排演稿｜新版節目介紹版"],["使用提醒","每段串場獨立頁面；主持人上台前翻到該串場頁，演出中原則上不需要翻頁。"],["使用提醒","左手拿平板時，左下角是下一段；也可用上方選單跳段落、調字體、切換深淺色、全螢幕、鎖定畫面。"],["流程","1. 開場 → 二胡演奏｜2. 二胡 → 陶笛團｜3. 陶笛團 → 太鼓｜4. 太鼓 → 演奏小團"],["流程","5. 演奏小團 → 教師陶笛｜6. 教師陶笛 → 陶笛阿志｜7. 陶笛阿志 → 薩克進階"],["流程","8. 薩克進階 → 薩克初階｜9. 薩克初階 → 小提琴｜10. 小提琴 → 長笛"],["流程","11. 長笛 → 陶笛初階｜12. 陶笛初階 → 古箏｜13. 古箏 → 直笛團｜14. 結尾"]]},{"title":"開場","lines":[["提示","主持人上台，全場就位。開場語氣熱情、有精神，帶出三光特色與今晚音樂會主軸。"],["男主持","各位來賓、各位老師、親愛的家長，還有今天準備在舞台上發光發熱的三光寶貝們，大家晚上好！"],["女主持","歡迎來到三光國小一年一度，最有夏天味、最有音樂感、最有幸福感的——"],["男女合","三光仲夏音樂會！"],["男主持","今天的三光國小很不一樣，平常是幸福學校、三好校園，今天直接升級成仲夏音樂廳。"],["女主持","我們三光平常有 STEAM、科展、AI、羽球、自然探索，今天還要證明：我們不只會探究，也很會演奏！"],["男主持","簡單來說，三光寶貝不出手則已，一出手就有料；一吹、一拉、一敲，全場直接被圈粉。"],["女主持","今晚有古典、有童趣、有熱血、有台灣味，還有滿滿的三光精神。請大家準備好三光限定版高品質掌聲。"],["男主持","接下來的每一組表演，都不是只有上台演奏而已，而是把練習、合作、勇氣和祝福，一起送給在場每一位觀眾。"],["男女合","三光仲夏音樂會正式開始！請欣賞第一個節目——二胡演奏！"]]},{"title":"1. 二胡演奏 → 2. 陶笛團","lines":[["提示","二胡演奏由中國竹笛與二胡合作；陶笛團曲目：〈放學回家的路上〉、〈世界的約定〉、〈豆豆龍〉。語氣由故事感轉清新童趣。"],["女主持","感謝二胡演奏帶來這麼有故事感的開場。二胡兩條弦，就像三光學習步道一樣，一拉開就走進文化風景。"],["男主持","也很像三光的 STEAM 課程，每個人都是不同零件，合起來組成夢想飛行器。"],["女主持","剛剛竹笛和二胡一搭一唱，好像把大家帶到一個全新的世界。暑假即將到來，也祝福畢業的三光寶貝們，帶著今天的掌聲往下一站出發。"],["男主持","接下來的聲音會變得清新可愛，要登場的是陶笛團。"],["女主持","他們會帶來〈放學回家的路上〉，像放學後背著書包、迎著風，一路把好心情吹回家。"],["男主持","接著還有宮崎駿動畫《霍爾的移動城堡》主題曲〈世界的約定〉，以及大家熟悉的〈豆豆龍〉。"],["男女合","請大家用最清新、最可愛的掌聲，歡迎——陶笛團！"]]},{"title":"2. 陶笛團 → 3. 太鼓","lines":[["提示","太鼓準備就位。語氣從溫柔切到熱血。"],["男主持","謝謝陶笛團！剛剛從放學路上的清新，走到動畫世界的溫柔，最後又回到童心滿滿的旋律。"],["女主持","接下來畫風要切換了。剛才是輕柔的風，下一個節目是舞台上的雷聲。"],["男主持","太鼓最迷人的地方，就是整齊的動作、和諧的對奏，還有一敲下去就讓全場精神上線的力量。"],["女主持","每一次鼓聲，都來自專注的眼神和反覆練習；每一次合奏，也都是孩子們彼此傾聽、一起完成的成果。"],["男主持","請大家把掌聲調成震撼模式。"],["男女合","歡迎——太鼓表演！"]]},{"title":"3. 太鼓 → 4. 演奏小團","lines":[["提示","演奏小團曲目：〈送你一對翅膀〉。由直笛、小提琴、陶笛、長笛與豎笛共同演出。"],["女主持","剛剛的太鼓真的很震撼，鼓聲一層一層推進，讓人感受到樂在其中、享受節奏的快樂。"],["男主持","接下來，我們要從熱血節奏，走向溫暖又充滿希望的旋律。"],["女主持","即將登場的「三光國小演奏小團」，由直笛、小提琴、陶笛與長笛團的學生組成，還有李品潔老師的豎笛一起加入。"],["男主持","他們要共同演繹〈送你一對翅膀〉，讓不同樂器的聲音彼此交織，把夢想輕輕托起來。"],["女主持","願這段旋律，像一對翅膀，帶著大家飛向更勇敢、更閃亮的自己。"],["男女合","請欣賞演奏小團帶來——〈送你一對翅膀〉！"]]},{"title":"4. 演奏小團 → 5. 教師陶笛","lines":[["提示","教師陶笛曲目含〈甜蜜的家庭〉、〈望春風〉，並有弦樂與陶笛阿志驚喜合作。這段加入「三光幸福半步甜」梗，語氣可活潑。"],["男主持","謝謝演奏小團！剛剛的旋律像把夢想放上天空，也把現場變得更溫暖。"],["女主持","聽說三光老師們最近研發出一種傳說中的「三光幸福半步甜」。"],["男主持","它是用三好校園的好品格、新育幸福學校的好氛圍、STEAM 的好創意，再加上科展精神、自然探索、羽球活力調配而成。"],["女主持","中了三光幸福半步甜會有什麼症狀？"],["男主持","第一，聽到陶笛會忍不住微笑；第二，看到老師上台會忍不住鼓掌；第三，走進三光會忍不住說：這間學校也太有特色了吧！"],["女主持","那要怎麼治療？"],["男主持","持續聆聽三光老師的陶笛演奏，並用掌聲補充幸福能量。實在是校園學習——"],["女主持","親師合作——"],["男女合","幸福成長，必備良方！"],["女主持","接下來要上場的，是今年全新成立的「三光教師陶笛團」。"],["男主持","平常老師們在講台前陪伴孩子學習，今天換他們拿起陶笛，用質樸溫潤的聲音陪伴大家。"],["女主持","第一首〈甜蜜的家庭〉，會把三光大家庭的溫馨吹進心裡；接著〈望春風〉還會加入季謙老師的大提琴與詩涵老師的小提琴，讓旋律更有層次。"],["男主持","最驚喜的是，最後還會邀請「陶笛阿志」一起現身，合奏〈初夏〉，把今晚的仲夏感一次拉滿。"],["男女合","請大家用最熱情的掌聲，歡迎——三光教師陶笛團！"]]},{"title":"5. 教師陶笛 → 6. 陶笛阿志","lines":[["提示","陶笛阿志曲目：〈森林狂想曲〉、〈無論如何〉、〈南島微風〉。語氣從校園幸福感轉自然、堅持與仲夏感。"],["女主持","謝謝三光教師陶笛團！從〈甜蜜的家庭〉到〈望春風〉，再到〈初夏〉，每一段都吹出三光校園的溫度。"],["男主持","接下來，陶笛的旅程還要繼續，而且畫面會更開闊。"],["女主持","〈森林狂想曲〉很適合三光，因為我們平常自然課就在觀察植物、昆蟲與環境，今天直接把自然搬進音樂裡。"],["男主持","〈無論如何〉有堅定的力量，好像在說：不管練習多辛苦，音樂都值得堅持。"],["女主持","最後的〈南島微風〉更有仲夏感，海風一吹，壓力就被吹走，暑假也慢慢靠近。"],["男主持","請大家跟著旋律走進森林，也迎向一陣充滿三光味的南島微風。"],["男女合","掌聲歡迎——陶笛阿志！"]]},{"title":"6. 陶笛阿志 → 7. 薩克進階","lines":[["提示","薩克進階曲目：《新世紀福音戰士》片頭主題曲。可保留假求救與全場集氣橋段。"],["女主持","謝謝陶笛阿志！剛剛的陶笛帶我們從森林走到南島微風，接下來畫風要突然熱血起來。"],["男主持","下一個節目是薩克進階，他們要帶來日本知名動畫《新世紀福音戰士》的片頭主題曲。"],["女主持","這首曲子自 1995 年推出以來深受全球動漫迷喜愛，改編成雙薩克斯風二重奏後，兩個聲部會彼此對話，也會用和聲把熱血旋律推得更高。"],["男主持","請大家準備迎接動漫主角登場般的氣勢，把掌聲開到最大聲，歡迎——"],["男主持","等一下！我耳機好像收到後台訊息：警報！薩克能量尚未啟動，需要立即請東諺、凡雯老師 SOLO 支援！"],["女主持","那太好了！東諺、凡雯老師，麻煩兩位來一段 SOLO 支援！"],["舞台提示","東諺、凡雯老師裝出驚訝、互看、搖手、找譜，像是真的沒準備。"],["男主持","咦？他們看起來好像完全沒有準備。怎麼辦？"],["女主持","沒關係！三光最強的不只是表演者，還有台下觀眾的集氣能力！"],["男主持","我說「東諺」，大家說「好帥」！東諺！"],["台下觀眾","好帥！"],["女主持","我說「凡雯」，大家說「超強」！凡雯！"],["台下觀眾","超強！"],["男女主持","最後一關！我們說「三光」，大家說「薩克啟動」！三光！"],["台下觀眾","薩克啟動！"],["舞台提示","東諺先 SOLO，凡雯老師接一句回應，10～15 秒。結尾要收束，方便接話。"],["男主持","哇！原來剛剛不是沒準備，是在等全場一起啟動！"],["女主持","這不是突發狀況，是三光限定版「假緊張、真精彩」！"],["男女合","掌聲歡迎——薩克進階！"]]},{"title":"7. 薩克進階 → 8. 薩克初階","lines":[["提示","薩克初階曲目：〈月夜愁〉。語氣從動漫熱血轉懷舊柔和。"],["男主持","剛剛薩克進階真的太熱血，雙薩克斯風一來一往，整個舞台都充滿動漫音樂的感染力。"],["女主持","接下來，薩克斯風要換一種表情，帶大家走進臺灣經典歌謠〈月夜愁〉。"],["男主持","〈月夜愁〉由鄧雨賢作曲，是臺灣歌謠的重要代表之一；它不是熱血衝刺，而是月光下慢慢浮現的思念與感傷。"],["女主持","薩克斯風溫暖又富有歌唱性的音色，很適合表現這首歌婉轉動人的旋律。"],["男主持","初階雖然叫初階，但能把經典旋律吹出情感，就是非常珍貴的成長。"],["男女合","請大家用最溫暖的掌聲，歡迎——薩克初階！"]]},{"title":"8. 薩克初階 → 9. 小提琴","lines":[["提示","小提琴曲目：〈茉莉花〉、〈波斯市場〉、〈小幸運〉、〈童話〉。"],["女主持","謝謝薩克初階！〈月夜愁〉讓今晚多了一點月光，也多了一份臺灣經典的韻味。"],["男主持","接下來是小提琴，而且曲目非常豐富，會從初階、中階一路聽到進階與合奏。"],["女主持","初階帶來〈茉莉花〉，清新又優雅；中階帶來〈波斯市場〉，讓我們走進充滿想像的異國市集。"],["男主持","進階則帶來〈小幸運〉，最後中階與進階還會合奏〈童話〉。從花香、市集、小幸運到童話世界，今晚的音樂旅程真的很完整。"],["女主持","請大家一起聽見孩子們一階一階累積出的努力與成熟。"],["男女合","掌聲歡迎——小提琴演奏！"]]},{"title":"9. 小提琴 → 10. 長笛","lines":[["提示","長笛曲目：〈甜蜜的家庭〉、〈古老的大鐘〉、〈美女與野獸〉。保留麥克風掌聲充電橋段，男主持需先關麥或做出沒聲音效果。"],["男主持","感謝小提琴帶來一趟美麗的音樂旅程，從優雅、異國風情，一路走到小幸運和童話。"],["女主持","接下來要登場的是長笛團，將為我們帶來三首雋永曲目。"],["男主持","首先以〈甜蜜的家庭〉揚起溫馨暖意；接著〈古老的大鐘〉用清亮笛聲訴說時光回憶；最後以〈美女與野獸〉帶領大家走入奇幻的童話世界。"],["女主持","長笛的聲音清亮又柔美，很像夏天傍晚吹過三光校園的風。接下來，就讓我們用最熱情的掌聲，歡迎——"],["舞台提示","男主持把自己的麥克風關掉，嘴巴說「長笛團！」但沒有聲音。女主持做出「你沒聲音」的表情。"],["女主持","等一下，你剛剛是不是沒聲音？"],["男主持","借我一下、借我一下。奇怪，為什麼沒電了？音控台那邊還好嗎？事務組呢？事務組怎麼沒有換電池？"],["女主持","你先不要緊張，而且事務組現在可能也很緊張。"],["男主持","等一下，我好像聽到麥克風有話要說。它說……它不是沒電，是剛剛掌聲不夠大聲，所以暫時罷工。"],["女主持","原來不是電池問題，是掌聲能量不足！"],["男主持","各位觀眾，這支麥克風需要大家幫它充電。我說「三光掌聲」，大家就用最大聲的掌聲幫它充電！"],["男主持","三光掌聲——"],["舞台提示","台下鼓掌後，男主持把自己的麥克風重新打開。"],["男主持","測試、測試！有了！看來三光觀眾的掌聲，比電池還有效。"],["男女合","請大家把剛剛充好的掌聲，送給——長笛演奏！"]]},{"title":"10. 長笛 → 11. 陶笛初階","lines":[["提示","陶笛初階曲目：〈瑪莉有隻小綿羊〉、〈小星星〉。語氣轉可愛、鼓勵。"],["女主持","謝謝長笛團！剛剛從家庭的溫馨、古老大鐘的時光感，一路走到童話世界，真的非常柔美。"],["男主持","接下來是陶笛初階，帶來大家非常熟悉的〈瑪莉有隻小綿羊〉和〈小星星〉。"],["女主持","初階的舞台最珍貴，因為每一個音符都代表一次練習，每一次練習都代表一句：我有努力。"],["男主持","這兩首旋律簡單、親切，也最能聽見孩子們把基礎一步一步吹穩的用心。"],["男女合","請大家用像星星一樣亮的掌聲，歡迎——陶笛初階！"]]},{"title":"11. 陶笛初階 → 12. 古箏","lines":[["提示","古箏曲目：〈男兒當自強〉、〈台灣好〉。可加入女主持舞蹈開場。"],["男主持","謝謝陶笛初階！熟悉的旋律一出來，整個現場都變得可愛又溫暖。"],["女主持","接下來要登場的是古箏，而且這一段很有氣勢。"],["男主持","第一首〈男兒當自強〉，改編自中國古曲《將軍令》，大家一聽到旋律，可能就會想到那種昂揚、堅定、充滿力量的精神。"],["女主持","第二首〈台灣好〉則來自臺東原住民民謠，會把土地的溫度和在地的情感帶到舞台上。"],["男主持","等一下，〈男兒當自強〉不能只是用介紹的，感覺要有一點身段、一點氣勢。"],["女主持","你是說，要先把氣勢舞出來？"],["男主持","沒錯！各位觀眾，這不是主持人突然離題，這是三光限定版——以舞引樂！"],["舞台提示","女主持 15～25 秒短舞：站穩、手勢展開、轉身或跨步、俐落定格。結束後停 1 秒。"],["男主持","哇！剛剛這一段不是普通的舞蹈，是先把豪氣請到舞台上了。"],["女主持","接下來，古箏將用琴聲接住這份氣勢，從剛強到溫暖，帶大家聽見不同的音樂風景。"],["男女合","請大家用充滿氣勢的掌聲，歡迎——古箏演奏！"]]},{"title":"12. 古箏 → 13. 直笛團","lines":[["提示","直笛團曲目：〈煌めきの空へ〉、〈高山青〉。壓軸前語氣明亮、有收束感。"],["女主持","感謝古箏演奏！從〈男兒當自強〉的豪氣，到〈台灣好〉的土地情感，讓人聽見古箏很有力量、也很有溫度的一面。"],["男主持","快樂的時光總是過得特別快，不知不覺來到今天最後一個節目。"],["女主持","最後登場的是直笛團，將帶來〈煌めきの空へ〉，中文可以理解為「朝向閃耀的天空」。"],["男主持","這首作品充滿希望與夢想，旋律有時輕快奔馳，有時悠揚抒情，就像孩子們抬頭仰望天空，帶著勇氣往前飛。"],["女主持","直笛團也會帶來大家熟悉的〈高山青〉。這次版本由李瑞晨老師特別為直笛團編創，運用高音、中音、次中音與低音直笛交織出豐富聲響。"],["男主持","透過不同聲部的合作，我們會聽見山林的遼闊、土地的熱愛，也聽見團員彼此傾聽的默契。"],["男女合","最後一個節目，請大家把掌聲切換成壓軸模式。歡迎——直笛團！"]]},{"title":"結尾","lines":[["提示","所有節目演出完成。主持人上台前確認直笛團謝幕完成，語氣溫暖正式。"],["男主持","感謝直笛團，也感謝今天所有表演者帶來這麼精彩的演出。"],["女主持","今晚我們從二胡與竹笛迎向全新的世界出發，聽見陶笛團清新可愛的旋律，也感受到太鼓整齊震撼的力量。"],["男主持","接著，演奏小團用不同樂器送出夢想的翅膀，三光教師陶笛團用溫潤陶笛吹出三光大家庭的溫度。"],["女主持","我們也跟著陶笛阿志走進森林、迎向南島微風，聽見薩克進階的動漫熱血與薩克初階的臺灣經典。"],["男主持","小提琴帶我們走過花香、市集、小幸運與童話，長笛吹出家庭、時光與奇幻，陶笛初階用熟悉旋律展現努力。"],["女主持","古箏讓我們聽見豪氣與在地情感，最後直笛團用閃耀天空與〈高山青〉，為今晚畫下最美的句點。"],["男主持","謝謝校長、老師、家長，以及所有在背後協助的工作人員。因為有大家，三光國小才能成為充滿音樂、幸福與創意的學校。"],["女主持","今晚的掌聲、笑聲和音樂聲，會成為這個仲夏最美好的回憶。"],["女主持","三光仲夏音樂會到這裡圓滿結束。"],["男女合","謝謝大家，我們明年再見！晚安！"]]},{"title":"附錄：現場救援短句","lines":[["說明","臨時卡住時，挑一句就好，不要整段念完。"],["救援｜表演者尚未就位","請大家把掌聲先放在手心裡，等一下表演者就位後，我們一起送出最熱情的鼓勵。"],["救援｜道具調整中","音樂會最重要的除了音樂，還有準備好每一個細節。讓我們稍等一下。"],["救援｜提醒掌聲","每一次上台都不容易，每一段旋律背後都有很多練習，讓我們再次給表演者一個大大的掌聲。"],["救援｜忘詞救援","接下來的節目非常精彩，精彩到我剛剛差點被自己的期待打斷。讓我們用掌聲迎接下一組表演者！"]]}];const rescue=segments[segments.length-1].lines.slice(1);let cur=+(localStorage.mc_cur||0),fs=+(localStorage.mc_fs||29),light=localStorage.mc_light==='1';const $=id=>document.getElementById(id),esc=s=>String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));function cls(r){if(r==='男主持')return'male';if(r==='女主持')return'female';if(r==='男女合'||r==='男女主持')return'both';if(r==='台下觀眾')return'audience';if(r==='舞台提示')return'stage';if(r==='提示')return'hint';if(r.startsWith('救援'))return'rescue';return''}function draw(){cur=Math.max(0,Math.min(cur,segments.length-1));localStorage.mc_cur=cur;localStorage.mc_fs=fs;localStorage.mc_light=light?'1':'0';document.documentElement.style.setProperty('--fs',fs+'px');document.documentElement.classList.toggle('light',light);$('segTitle').textContent=segments[cur].title;$('count').textContent=(cur+1)+' / '+segments.length;$('prog').style.width=((cur+1)/segments.length*100)+'%';$('jump').value=cur;$('content').innerHTML=segments[cur].lines.map(([r,t])=>`<div class="line ${cls(r)}"><div class="role ${cls(r)}">${esc(r)}</div><div class="text">${esc(t)}</div></div>`).join('');$('card').scrollTo({top:0,behavior:'auto'});$('prev').disabled=cur===0;$('next').disabled=cur===segments.length-1}segments.forEach((s,i)=>{let o=document.createElement('option');o.value=i;o.textContent=String(i+1).padStart(2,'0')+'｜'+s.title;$('jump').appendChild(o)});$('prev').onclick=()=>{cur--;draw()};$('next').onclick=()=>{cur++;draw()};$('jump').onchange=()=>{cur=+$('jump').value;draw()};$('small').onclick=()=>{fs=Math.max(22,fs-2);draw()};$('big').onclick=()=>{fs=Math.min(42,fs+2);draw()};$('theme').onclick=()=>{light=!light;draw()};$('top').onclick=()=>$('card').scrollTo({top:0,behavior:'smooth'});$('lock').onclick=()=>{document.body.classList.toggle('locked');$('lock').textContent=document.body.classList.contains('locked')?'解鎖':'鎖定'};$('full').onclick=async()=>{try{document.fullscreenElement?await document.exitFullscreen():await document.documentElement.requestFullscreen()}catch(e){alert('此瀏覽器可能不支援全螢幕。')}};$('rescue').onclick=()=>$('modal').classList.add('open');$('close').onclick=()=>$('modal').classList.remove('open');$('modal').onclick=e=>{if(e.target.id==='modal')$('modal').classList.remove('open')};document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' ') {cur++;draw()} if(e.key==='ArrowLeft'||e.key==='PageUp'){cur--;draw()} if(e.key==='Escape')$('modal').classList.remove('open')});$('rescueContent').innerHTML=rescue.map(([r,t])=>`<div class="line rescue"><div class="role rescue">${esc(r)}</div><div class="text">${esc(t)}</div></div>`).join('');draw();</script></body></html>
