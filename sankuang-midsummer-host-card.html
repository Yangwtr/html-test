<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>三光仲夏音樂會｜平板主持手卡</title><style>:root{--bg:#0b1020;--card:#121b33;--card2:#172443;--text:#f6f7fb;--muted:#b7c0d8;--line:rgba(255,255,255,.16);--male:#79c7ff;--female:#ff9fc2;--both:#a7f3d0;--stage:#ffd166;--aud:#d9b8ff;--fs:29px}html.light{--bg:#f4f6fb;--card:#fff;--card2:#eef3ff;--text:#101828;--muted:#526071;--line:rgba(16,24,40,.16);--male:#005d99;--female:#a10f52;--both:#047857;--stage:#8a4b00;--aud:#6d28d9}*{box-sizing:border-box}body{margin:0;height:100vh;overflow:hidden;background:radial-gradient(circle at top left,rgba(57,87,167,.45),transparent 35%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif}.app{height:100vh;display:grid;grid-template-rows:auto 7px 1fr auto}header{padding:12px 14px;border-bottom:1px solid var(--line);background:rgba(8,13,28,.88);display:grid;grid-template-columns:1fr auto;gap:10px}html.light header,html.light footer{background:rgba(255,255,255,.92)}.event{font-weight:900;color:var(--muted);font-size:17px}.title{font-weight:950;font-size:clamp(24px,4vw,38px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}button,select{min-height:46px;border:1px solid var(--line);background:var(--card2);color:var(--text);border-radius:14px;padding:8px 13px;font-size:18px;font-weight:850}select{max-width:360px}.bar{background:rgba(255,255,255,.1)}.prog{height:100%;width:0;background:linear-gradient(90deg,#ffd166,#a7f3d0)}main{overflow:hidden;position:relative}.card{height:100%;overflow:auto;-webkit-overflow-scrolling:touch;padding:18px 18px 96px}.inner{max-width:1180px;margin:auto;display:flex;flex-direction:column;gap:12px}.line{display:grid;grid-template-columns:minmax(112px,172px) 1fr;gap:12px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.05);padding:13px 14px}.role{display:flex;align-items:center;justify-content:center;text-align:center;border-radius:15px;background:rgba(255,255,255,.08);font-size:20px;font-weight:950;padding:8px}.text{font-size:var(--fs);font-weight:760;line-height:1.56;letter-spacing:.015em}.male{color:var(--male)}.female{color:var(--female)}.both{color:var(--both)}.stage,.hint{color:var(--stage)}.audience{color:var(--aud)}.line.stage,.line.hint{border-color:color-mix(in srgb,var(--stage) 45%,transparent);background:color-mix(in srgb,var(--stage) 9%,transparent)}.rescue{color:#ff7a7a}.line.rescue{border-color:rgba(255,122,122,.45);background:rgba(255,122,122,.08)}footer{position:fixed;left:0;right:0;bottom:0;padding:10px 14px;display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;border-top:1px solid var(--line);background:rgba(8,13,28,.9)}.nav{min-height:58px;font-size:22px;width:100%}.count{min-width:110px;text-align:center;font-weight:950;color:var(--muted);font-size:18px}.fab{position:fixed;right:14px;bottom:76px;display:flex;flex-direction:column;gap:10px}.fab button{min-width:58px;min-height:52px;border-radius:18px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.58);z-index:20;display:none;align-items:center;justify-content:center;padding:18px}.modal.open{display:flex}.box{width:min(1050px,100%);max-height:90vh;overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:26px;padding:20px}.boxhead{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.boxtitle{font-size:28px;font-weight:950;color:var(--stage)}body.locked header .tools,body.locked .fab{display:none}body.locked header{grid-template-columns:1fr}@media (orientation:portrait){header{grid-template-columns:1fr}.tools{justify-content:stretch}select{max-width:none;flex:1 1 100%}.line{grid-template-columns:1fr}.role{justify-content:flex-start}.title{white-space:normal}.text{font-size:calc(var(--fs)*.94)}}@media print{header,footer,.fab{display:none}body{overflow:auto;background:white;color:black}.app,main,.card{height:auto;overflow:visible}.line{page-break-inside:avoid}}</style></head><body><div class="app"><header><div><div class="event">三光仲夏音樂會｜平板主持手卡</div><div id="segTitle" class="title"></div></div><div class="tools"><select id="jump"></select><button id="small">字－</button><button id="big">字＋</button><button id="theme">☀︎/☾</button><button id="lock">鎖定</button><button id="full">全螢幕</button></div></header><div class="bar"><div id="prog" class="prog"></div></div><main><section id="card" class="card"><div id="content" class="inner"></div></section></main><footer><button id="prev" class="nav">← 上一段</button><div id="count" class="count"></div><button id="next" class="nav">下一段 →</button></footer></div><div class="fab"><button id="top">↑</button><button id="rescue">救援</button></div><div id="modal" class="modal"><div class="box"><div class="boxhead"><div><div class="boxtitle">現場救援短句</div><div style="color:var(--muted);font-size:16px">臨時卡住時，挑一句就好，不要整段念完。</div></div><button id="close">關閉</button></div><div id="rescueContent" class="inner"></div></div></div><script>const segments=[{title:'流程總覽／操作說明',lines:[['標題','三光仲夏音樂會'],['標題','雙主持排演稿｜大字清楚版'],['使用提醒','每段串場獨立頁面；主持人上台前翻到該串場頁，演出中原則上不需要翻頁。'],['使用提醒','可用上方選單跳段落，可調字體大小、切換深淺色、全螢幕、鎖定畫面。'],['流程','1. 開場 → 二胡演奏｜2. 二胡 → 陶笛團｜3. 陶笛團 → 太鼓｜4. 太鼓 → 演奏小團'],['流程','5. 演奏小團 → 教師陶笛｜6. 教師陶笛 → 陶笛阿志｜7. 陶笛阿志 → 薩克進階'],['流程','8. 薩克進階 → 薩克初階｜9. 薩克初階 → 小提琴｜10. 小提琴 → 長笛'],['流程','11. 長笛 → 陶笛初階｜12. 陶笛初階 → 古箏｜13. 古箏 → 直笛團｜14. 結尾']]},{title:'開場',lines:[['提示','主持人上台，全場就位。開場語氣熱情、有精神。'],['男主持','各位來賓、各位老師、親愛的家長，還有今天準備在舞台上發光發熱的三光寶貝們，大家晚上好！'],['女主持','歡迎來到三光國小一年一度，最有夏天味、最有音樂感、最有幸福感的——'],['男女合','三光仲夏音樂會！'],['男主持','今天的三光國小很不一樣，平常是幸福學校、三好校園，今天直接升級成仲夏音樂廳。'],['女主持','我們三光平常有 STEAM、科展、AI、羽球、自然探索，今天還要證明：我們不只會探究，也很會演奏！'],['男主持','簡單來說，三光寶貝不出手則已，一出手就有料；一吹、一拉、一敲，全場直接被圈粉。'],['女主持','今晚有古典、有童趣、有熱血、有台灣味，還有滿滿的三光精神。請大家準備好三光限定版高品質掌聲。'],['男女合','三光仲夏音樂會正式開始！請欣賞第一個節目——二胡演奏！']]},{title:'1. 二胡演奏 → 2. 陶笛團',lines:[['提示','陶笛團曲目：〈放學回家的路上〉、〈世界的約定〉、〈豆豆龍〉。語氣由古典轉清新。'],['女主持','感謝二胡演奏帶來這麼有故事感的開場。二胡兩條弦，就像三光學習步道一樣，一拉開就走進文化風景。'],['男主持','我剛剛聽到二胡，整個人都變得很有氣質，差點連晚餐吃什麼都想用詩句回答。'],['女主持','接下來要登場的是陶笛團，帶來〈放學回家的路上〉、〈世界的約定〉和〈豆豆龍〉。'],['男主持','〈放學回家的路上〉一聽就有畫面：書包背著、晚風吹著，心裡想著——今天作業會不會自己消失？'],['女主持','不會，作業還在。但〈世界的約定〉會帶我們走進宮崎駿動畫的溫柔世界，最後的〈豆豆龍〉更是童心滿分。'],['男女合','請大家用最清新、最可愛的掌聲，歡迎——陶笛團！']]},{title:'2. 陶笛團 → 3. 太鼓',lines:[['提示','太鼓準備就位。語氣從溫柔切到熱血。'],['男主持','謝謝陶笛團！剛剛從〈放學回家的路上〉走到〈豆豆龍〉，感覺三光校園都多了一陣動畫裡的微風。'],['女主持','接下來畫風要切換了。剛才是森林裡的微風，下一個節目是舞台上的雷聲。'],['男主持','太鼓一敲下去，精神直接上線，可能連後排觀眾都會坐得比上課還端正。'],['女主持','太鼓最迷人的地方，就是整齊的動作、專注的眼神，還有充滿力量的節奏。'],['男主持','這也很像三光孩子的學習精神：專注、合作、勇敢。'],['男女合','請大家把掌聲調成震撼模式，歡迎——太鼓表演！']]},{title:'3. 太鼓 → 4. 演奏小團',lines:[['提示','演奏小團曲目：〈送你一對翅膀〉。語氣由熱血轉溫暖。'],['女主持','剛剛的太鼓真的太震撼了，我差點以為三光羽球隊要進場殺球。'],['男主持','還好沒有，不然今天就從音樂會變成公開賽。'],['女主持','接下來是演奏小團，要帶來〈送你一對翅膀〉。這首曲子很溫暖，像把夢想輕輕放在手心，再送它飛上天空。'],['男主持','也很像三光的 STEAM 課程，每個人都是不同零件，合起來組成夢想飛行器。'],['女主持','那我們不要耽誤夢想起飛的時間。'],['男女合','請欣賞演奏小團帶來——〈送你一對翅膀〉！']]},{title:'4. 演奏小團 → 5. 教師陶笛',lines:[['提示','加入「三光幸福半步甜」橋段。教師陶笛曲目：〈望春風〉、〈甜蜜的家庭〉。'],['男主持','謝謝演奏小團！接下來要上場的，是三光最熟悉、最親切，也最有反差萌的一群人——教師陶笛團！'],['女主持','聽說三光老師們最近研發出一種傳說中的「三光幸福半步甜」。'],['男主持','它是用三好校園的好品格、新育幸福學校的好氛圍、STEAM 的好創意，再加上科展精神、自然探索、羽球活力調配而成。'],['女主持','中了三光幸福半步甜會有什麼症狀？'],['男主持','第一，聽到陶笛會忍不住微笑；第二，看到老師上台會忍不住鼓掌；第三，走進三光會忍不住說：這間學校也太有特色了吧！'],['女主持','那要怎麼治療？'],['男主持','持續聆聽三光老師的陶笛演奏，並用掌聲補充幸福能量。實在是校園學習——'],['女主持','親師合作——'],['男女合','幸福成長，必備良方！'],['女主持','接下來請欣賞〈望春風〉與〈甜蜜的家庭〉。'],['男女合','掌聲歡迎——教師陶笛團！']]},{title:'5. 教師陶笛 → 6. 陶笛阿志',lines:[['提示','陶笛阿志曲目：〈森林狂想曲〉、〈無論如何〉、〈南島微風〉。'],['女主持','謝謝教師陶笛團！剛剛的〈望春風〉有台灣味，〈甜蜜的家庭〉有三光味，兩首合起來就是滿滿幸福味。'],['男主持','接下來的曲目很有畫面感，光聽名字就像要去旅行：〈森林狂想曲〉、〈無論如何〉、〈南島微風〉。'],['女主持','〈森林狂想曲〉很適合三光，因為我們平常自然課就在觀察植物、昆蟲與環境，今天直接把自然搬進音樂裡。'],['男主持','〈無論如何〉有堅定的力量，好像在說：不管練習多辛苦，音樂都值得堅持。'],['女主持','最後的〈南島微風〉更有仲夏感，海風一吹，壓力就被吹走，暑假也慢慢靠近。'],['男女合','請大家跟著陶笛旋律，走進森林、迎向微風。掌聲歡迎——陶笛阿志！']]},{title:'6. 陶笛阿志 → 7. 薩克進階',lines:[['提示','加入假求救失誤＋全場咒語集氣＋SOLO 接場。薩克進階曲目：《新世紀福音戰士》片頭主題曲。'],['女主持','謝謝陶笛阿志！接下來畫風要突然熱血起來，下一個節目是薩克進階，將帶來《新世紀福音戰士》片頭主題曲。'],['男主持','這首曲子一出來，氣氛會瞬間變成動漫主角登場。不是走上舞台，是啟動機甲。'],['女主持','請大家準備迎接熱血旋律，把掌聲開到最大聲，歡迎——'],['男主持','等一下！我耳機好像收到後台訊息：警報！薩克能量尚未啟動，需要立即請東諺、凡雯老師 SOLO 支援！'],['女主持','那太好了！東諺、凡雯老師，麻煩兩位來一段 SOLO 支援！'],['舞台提示','東諺、凡雯老師裝出驚訝、互看、搖手、找譜，像是真的沒準備。'],['男主持','咦？他們看起來好像完全沒有準備。怎麼辦？'],['女主持','沒關係！三光最強的不只是表演者，還有台下觀眾的集氣能力！'],['男主持','我說「東諺」，大家說「好帥」！東諺！'],['台下觀眾','好帥！'],['男主持','東諺！'],['台下觀眾','好帥！'],['女主持','我說「凡雯」，大家說「超強」！凡雯！'],['台下觀眾','超強！'],['女主持','凡雯！'],['台下觀眾','超強！'],['男女主持','最後一關！我們說「三光」，大家說「薩克啟動」！三光！'],['台下觀眾','薩克啟動！'],['男女主持','最後一次，全場最大聲！三光！'],['台下觀眾','薩克啟動！'],['舞台提示','東諺先 SOLO，凡雯老師接一句回應，10～15 秒。結尾要收束，方便接話。'],['男主持','哇！原來剛剛不是沒準備，是在等全場一起啟動！'],['女主持','剛剛那段 SOLO 太帥了，這不是突發狀況，是三光限定版「假緊張、真精彩」！'],['男女合','掌聲歡迎——薩克進階！']]},{title:'7. 薩克進階 → 8. 薩克初階',lines:[['提示','薩克初階曲目：〈月夜愁〉。語氣從動漫熱血轉懷舊柔和。'],['男主持','剛剛薩克進階真的太熱血，聽完有一種想立刻報名動漫社的衝動。'],['女主持','先冷靜，接下來薩克初階要帶來的是經典臺語歌曲〈月夜愁〉。'],['男主持','〈月夜愁〉的氣氛就不一樣了，它不是熱血衝刺，而是月光下慢慢想起一段故事。'],['女主持','薩克斯風溫暖又帶一點沙沙的音色，很適合表現這首歌的懷舊與思念。'],['男主持','初階雖然叫初階，但不要小看他們。所有進階高手，都是從初階開始的。這句話聽起來像廢話，但它是真的。'],['女主持','能站上舞台就是勇氣，能把〈月夜愁〉吹出感情就是成長。'],['男女合','請大家用最溫暖的掌聲，歡迎——薩克初階！']]},{title:'8. 薩克初階 → 9. 小提琴',lines:[['提示','小提琴曲目：〈茉莉花〉、〈波斯市場〉、〈小幸運〉、〈童話〉。'],['女主持','謝謝薩克初階！〈月夜愁〉讓今晚多了一點月光，也多了一點溫柔。'],['男主持','接下來是小提琴，而且曲目非常豐富：〈茉莉花〉、〈波斯市場〉、〈小幸運〉和〈童話〉。'],['女主持','〈茉莉花〉優雅清新，像一朵慢慢綻放的花；〈波斯市場〉有異國風情，像走進熱鬧又神祕的市集。'],['男主持','〈小幸運〉很適合今晚，因為能和大家一起坐在三光國小聽音樂，本身就是一種小幸運。'],['女主持','最後的〈童話〉更浪漫，希望大家都能在音樂裡找到屬於自己的夢想故事。'],['男女合','請大家用優雅又熱情的掌聲，歡迎——小提琴演奏！']]},{title:'9. 小提琴 → 10. 長笛',lines:[['提示','加入麥克風沒電假失誤＋掌聲充電。長笛曲目：〈甜蜜的家庭〉、〈古老的大鐘〉、〈美女與野獸〉。'],['男主持','感謝小提琴帶來一趟美麗的音樂旅程，從花香、市集、小幸運，一路走到童話世界。'],['女主持','接下來要登場的是長笛演奏，曲目是〈甜蜜的家庭〉、〈古老的大鐘〉和〈美女與野獸〉。'],['男主持','長笛的聲音清亮又柔美，很像夏天傍晚吹過三光校園的風。接下來，就讓我們用最熱情的掌聲，歡迎——'],['舞台提示','男主持把自己的麥克風關掉，嘴巴說「長笛團！」但沒有聲音。女主持做出「你沒聲音」的表情。'],['女主持','等一下，你剛剛是不是沒聲音？'],['男主持','借我一下、借我一下。奇怪，為什麼沒電了？音控台那邊還好嗎？事務組呢？事務組怎麼沒有換電池？'],['女主持','你先不要緊張，而且事務組現在可能也很緊張。'],['男主持','等一下，我好像聽到麥克風有話要說。它說……它不是沒電，是剛剛掌聲不夠大聲，所以暫時罷工。'],['女主持','原來不是電池問題，是掌聲能量不足！'],['男主持','各位觀眾，這支麥克風需要大家幫它充電。我說「三光掌聲」，大家就用最大聲的掌聲幫它充電！'],['男主持','三光掌聲——'],['舞台提示','台下鼓掌後，男主持把自己的麥克風重新打開。'],['男主持','測試、測試！有了！真的有聲音了！'],['女主持','看來三光觀眾的掌聲，比電池還有效。'],['男主持','現在麥克風有聲音，掌聲也有能量，剛好迎接下一個節目。'],['男女合','請大家把剛剛充好的掌聲，送給——長笛演奏！']]},{title:'10. 長笛 → 11. 陶笛初階',lines:[['提示','陶笛初階曲目：〈瑪莉有隻小綿羊〉、〈小星星〉。語氣轉可愛、鼓勵。'],['女主持','謝謝長笛團！剛剛的長笛像夏日傍晚吹過三光校園的風，柔柔的、亮亮的。'],['男主持','接下來是陶笛初階，帶來大家非常熟悉的〈瑪莉有隻小綿羊〉和〈小星星〉。'],['女主持','這兩首可以說是音樂界的入門神曲。小朋友會唱，大人會哼，連路過的小綿羊可能都會點頭。'],['男主持','初階的舞台最珍貴，因為每一個音符都代表一次練習，每一次練習都代表一句：我有努力。'],['男女合','請大家用像星星一樣亮的掌聲，歡迎——陶笛初階！']]},{title:'11. 陶笛初階 → 12. 古箏',lines:[['提示','加入女主持舞蹈開場。古箏曲目：〈男兒當自強〉、〈台灣好〉。'],['男主持','謝謝陶笛初階！〈瑪莉有隻小綿羊〉和〈小星星〉一出來，整個現場都變得可愛了。'],['女主持','接下來要登場的是古箏，而且這一段很有氣勢，曲目是〈男兒當自強〉和〈台灣好〉。'],['男主持','等一下，〈男兒當自強〉不能只是用介紹的，感覺要有一點身段、一點江湖味。'],['女主持','你是說，要先把氣勢舞出來？'],['男主持','沒錯！大家可能不知道，我們女主持人可是舞蹈系的。平常主持很優雅，等一下變成三光舞林高手。'],['女主持','那我就用一小段舞蹈，幫古箏把〈男兒當自強〉的氣勢先打開。'],['男主持','各位觀眾，這不是主持人突然離題，這是三光限定版——以舞引樂！'],['舞台提示','女主持 15～25 秒短舞：站穩、手勢展開、轉身或跨步、俐落定格。結束後停 1 秒。'],['男主持','哇！剛剛這一段不是普通的舞蹈，是把〈男兒當自強〉的豪氣先請到舞台上了。'],['女主持','接下來，古箏將用琴聲接住這份氣勢，從〈男兒當自強〉的剛強，到〈台灣好〉的在地溫暖。'],['男女合','請大家用充滿氣勢的掌聲，歡迎——古箏演奏！']]},{title:'12. 古箏 → 13. 直笛團',lines:[['提示','直笛團曲目：〈高山青〉。壓軸前語氣明亮、有收束感。'],['女主持','感謝古箏演奏！〈男兒當自強〉讓人熱血，〈台灣好〉讓人感受到土地的溫度。'],['男主持','快樂的時光總是過得特別快，不知不覺來到今天最後一個節目。'],['女主持','最後登場的是直笛團，將帶來臺灣經典旋律〈高山青〉。'],['男主持','〈高山青〉旋律悠揚明亮，會讓人想到遼闊山林、清新空氣，還有原住民族熱情純樸的文化情感。'],['女主持','這次直笛團運用不同種類直笛的音色彼此交織，就像三光孩子彼此合作，每個人都有自己的聲音，也一起完成最美的和聲。'],['男女合','最後一個節目，請大家把掌聲切換成壓軸模式。歡迎——直笛團帶來〈高山青〉！']]},{title:'結尾',lines:[['提示','所有節目演出完成。主持人上台前確認直笛團謝幕完成，語氣溫暖正式。'],['男主持','感謝直笛團，也感謝今天所有表演者帶來這麼精彩的演出。'],['女主持','今晚我們從二胡的古典韻味出發，聽見陶笛的清新可愛、太鼓的震撼力量、演奏小團的溫暖希望。'],['男主持','也跟著陶笛走進森林與南島微風，聽老師們吹出〈望春風〉與〈甜蜜的家庭〉，感受三光大家庭的溫度。'],['女主持','接著聽見薩克的熱血與懷舊、小提琴的優雅與青春、長笛的童話與時光、陶笛初階的童趣、古箏的豪氣與在地情懷。'],['男主持','最後用直笛團的〈高山青〉，為今晚畫下最美的句點。'],['女主持','謝謝校長、老師、家長，以及所有在背後協助的工作人員。因為有大家，三光國小才能成為充滿音樂、幸福與創意的學校。'],['男主持','今晚的掌聲、笑聲和音樂聲，會成為這個仲夏最美好的回憶。'],['女主持','三光仲夏音樂會到這裡圓滿結束。'],['男女合','謝謝大家，我們明年再見！晚安！']]},{title:'附錄：現場救援短句',lines:[['說明','臨時卡住時，挑一句就好，不要整段念完。'],['救援｜表演者尚未就位','請大家把掌聲先放在手心裡，等一下表演者就位後，我們一起送出最熱情的鼓勵。'],['救援｜道具調整中','音樂會最重要的除了音樂，還有準備好每一個細節。讓我們稍等一下。'],['救援｜提醒掌聲','每一次上台都不容易，每一段旋律背後都有很多練習，讓我們再次給表演者一個大大的掌聲。'],['救援｜忘詞救援','接下來的節目非常精彩，精彩到我剛剛差點被自己的期待打斷。讓我們用掌聲迎接下一組表演者！']]}];const rescue=segments[segments.length-1].lines.slice(1);let cur=+(localStorage.mc_cur||0),fs=+(localStorage.mc_fs||29),light=localStorage.mc_light==='1';const $=id=>document.getElementById(id),esc=s=>String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));function cls(r){if(r==='男主持')return'male';if(r==='女主持')return'female';if(r==='男女合'||r==='男女主持')return'both';if(r==='台下觀眾')return'audience';if(r==='舞台提示')return'stage';if(r==='提示')return'hint';if(r.startsWith('救援'))return'rescue';return''}function draw(){cur=Math.max(0,Math.min(cur,segments.length-1));localStorage.mc_cur=cur;localStorage.mc_fs=fs;localStorage.mc_light=light?'1':'0';document.documentElement.style.setProperty('--fs',fs+'px');document.documentElement.classList.toggle('light',light);$('segTitle').textContent=segments[cur].title;$('count').textContent=(cur+1)+' / '+segments.length;$('prog').style.width=((cur+1)/segments.length*100)+'%';$('jump').value=cur;$('content').innerHTML=segments[cur].lines.map(([r,t])=>`<div class="line ${cls(r)}"><div class="role ${cls(r)}">${esc(r)}</div><div class="text">${esc(t)}</div></div>`).join('');$('card').scrollTo({top:0,behavior:'instant'});$('prev').disabled=cur===0;$('next').disabled=cur===segments.length-1}segments.forEach((s,i)=>{let o=document.createElement('option');o.value=i;o.textContent=String(i+1).padStart(2,'0')+'｜'+s.title;$('jump').appendChild(o)});$('prev').onclick=()=>{cur--;draw()};$('next').onclick=()=>{cur++;draw()};$('jump').onchange=()=>{cur=+$('jump').value;draw()};$('small').onclick=()=>{fs=Math.max(22,fs-2);draw()};$('big').onclick=()=>{fs=Math.min(42,fs+2);draw()};$('theme').onclick=()=>{light=!light;draw()};$('top').onclick=()=>$('card').scrollTo({top:0,behavior:'smooth'});$('lock').onclick=()=>{document.body.classList.toggle('locked');$('lock').textContent=document.body.classList.contains('locked')?'解鎖':'鎖定'};$('full').onclick=async()=>{try{document.fullscreenElement?await document.exitFullscreen():await document.documentElement.requestFullscreen()}catch(e){alert('此瀏覽器可能不支援全螢幕。')}};$('rescue').onclick=()=>$('modal').classList.add('open');$('close').onclick=()=>$('modal').classList.remove('open');$('modal').onclick=e=>{if(e.target.id==='modal')$('modal').classList.remove('open')};document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' ') {cur++;draw()} if(e.key==='ArrowLeft'||e.key==='PageUp'){cur--;draw()} if(e.key==='Escape')$('modal').classList.remove('open')});$('rescueContent').innerHTML=rescue.map(([r,t])=>`<div class="line rescue"><div class="role rescue">${esc(r)}</div><div class="text">${esc(t)}</div></div>`).join('');draw();</script></body></html>
